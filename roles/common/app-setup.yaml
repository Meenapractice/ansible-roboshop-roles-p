- name: creating system user
  ansible.builtin.user:
    name: roboshop
    home: /app
    shell: /sbin/nologin
    comment: created roboshop user

- name: Deleting the app dir
  ansible.builtin.file:
    path: /app
    state: absent

- name: Creating the app directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: deleting the code
  ansible.builtin.file:
    path: "/tmp/{{ component }}.zip"
    state: absent

- name: dowloading the code
  ansible.builtin.get_url:
    url: "https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip"
    dest: "/tmp/{{ component }}.zip"

- name: unarchive the code
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: true