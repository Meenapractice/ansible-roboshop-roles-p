- name: app-setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: java-setup
  ansible.builtin.import_role:
    name: common
    tasks_from: java-setup.yaml

- name: system-setup
  ansible.builtin.import_role:
    name: common
    tasks_from: system-setup.yaml

- name: pip install
  ansible.builtin.pip:
    name: "{{ item }}"
    state: present
  loop:
  - PyMySQL
  - cryptography

- name: checking and loading data in db
  community.mysql.mysql_db:
      login_user: root
      login_password: RoboShop@1
      login_host: "{{ MYSQL_HOST }}"
      state: import
      name: all
      target: "{{ item }}"
  loop:
      - /app/db/schema.sql
      - /app/db/app-user.sql 
      - /app/db/master-data.sql 
  notify: enable and restart the service

