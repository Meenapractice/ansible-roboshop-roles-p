- name: app-setup
  ansible.builtin.import:
    name: app-setup.yaml
    tasks_from: common

- name: nodejs-setup
  ansible.builtin.import:
    name: nodejs-setup.yaml
    tasks_from: common

- name: system-setup
  ansible.builtin.import:
    name: system-setup.yaml
    tasks_from: common

- name: copying mongo repo
  ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: installing mongosh client
  ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

- name: checking if products are loaded in db
  ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: db_output

- name: print the db output
  ansible.builtin.debug:
    msg: "{{ db_output }}"

- name: Load the products in db
  ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
  when: db_output.stdout | int < 0

- name: enable and start the service
  ansible.builtin.service:
    name: catalogue
    enabled: yes
    state: restarted


  